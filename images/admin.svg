<!-- 人物1：行政女秘书 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fce7d6"/>
      <stop offset="100%" style="stop-color:#f5d5c0"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a3728"/>
      <stop offset="100%" style="stop-color:#2d1f14"/>
    </linearGradient>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8"/>
      <stop offset="100%" style="stop-color:#d0d0d0"/>
    </linearGradient>
  </defs>
  
  <!-- 身体 -->
  <path d="M40 280 Q40 180 100 170 Q160 180 160 280" fill="#6366f1"/>
  
  <!-- 衬衫领口 -->
  <path d="M70 170 L100 195 L130 170" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- 脖子 -->
  <rect x="88" y="145" width="24" height="30" fill="url(#skinGrad)"/>
  
  <!-- 头发后部 -->
  <ellipse cx="100" cy="85" rx="55" ry="60" fill="url(#hairGrad)"/>
  
  <!-- 脸 -->
  <ellipse cx="100" cy="90" rx="48" ry="52" fill="url(#skinGrad)"/>
  
  <!-- 头发前部 -->
  <path d="M45 75 Q50 40 100 35 Q150 40 155 75 Q150 55 100 50 Q50 55 45 75" fill="url(#hairGrad)"/>
  
  <!-- 眉毛 -->
  <path d="M65 78 Q75 74 85 78" stroke="#4a3728" stroke-width="2" fill="none"/>
  <path d="M115 78 Q125 74 135 78" stroke="#4a3728" stroke-width="2" fill="none"/>
  
  <!-- 眼睛 -->
  <ellipse cx="75" cy="90" rx="8" ry="6" fill="#fff"/>
  <ellipse cx="125" cy="90" rx="8" ry="6" fill="#fff"/>
  <circle cx="75" cy="90" r="4" fill="#4a3728"/>
  <circle cx="125" cy="90" r="4" fill="#4a3728"/>
  <circle cx="76" cy="89" r="1.5" fill="#fff"/>
  <circle cx="126" cy="89" r="1.5" fill="#fff"/>
  
  <!-- 鼻子 -->
  <path d="M100 95 L98 110 L102 110" stroke="#d4a98a" stroke-width="2" fill="none"/>
  
  <!-- 嘴巴 -->
  <path d="M88 122 Q100 130 112 122" stroke="#e07070" stroke-width="2.5" fill="none"/>
  
  <!-- 腮红 -->
  <ellipse cx="60" cy="108" rx="10" ry="6" fill="#fbbfbf" opacity="0.5"/>
  <ellipse cx="140" cy="108" rx="10" ry="6" fill="#fbbfbf" opacity="0.5"/>
  
  <!-- 手臂 -->
  <path d="M40 200 Q20 220 30 260" stroke="#6366f1" stroke-width="25" fill="none" stroke-linecap="round"/>
  <path d="M160 200 Q180 220 170 260" stroke="#6366f1" stroke-width="25" fill="none" stroke-linecap="round"/>
  
  <!-- 手 -->
  <circle cx="30" cy="265" r="15" fill="url(#skinGrad)"/>
  <circle cx="170" cy="265" r="15" fill="url(#skinGrad)"/>
  
  <!-- 记录板 -->
  <rect x="5" y="220" width="50" height="60" rx="3" fill="#8b5cf6"/>
  <rect x="10" y="225" width="40" height="50" rx="2" fill="#fff"/>
  <line x1="15" y1="235" x2="45" y2="235" stroke="#6366f1" stroke-width="2"/>
  <line x1="15" y1="245" x2="45" y2="245" stroke="#6366f1" stroke-width="2"/>
  <line x1="15" y1="255" x2="35" y2="255" stroke="#6366f1" stroke-width="2"/>
  <line x1="15" y1="265" x2="40" y2="265" stroke="#6366f1" stroke-width="2"/>
</svg>